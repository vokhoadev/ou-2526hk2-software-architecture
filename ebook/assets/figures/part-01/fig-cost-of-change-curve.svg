<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Georgia, serif" font-size="11">
  <title>Cost of change vs lifecycle phase</title>
  <rect width="440" height="220" fill="#faf9f7"/>
  <text x="220" y="20" text-anchor="middle" font-weight="bold">Relative cost of architectural change</text>
  <line x1="60" y1="180" x2="380" y2="180" stroke="#333"/>
  <line x1="60" y1="180" x2="60" y2="40" stroke="#333"/>
  <text x="30" y="112" font-size="9" transform="rotate(-90 30,112)">Cost (qualitative)</text>
  <text x="220" y="205" text-anchor="middle" font-size="10">Project time -></text>
  <path d="M 70 170 Q 120 150 180 100 T 350 50" fill="none" stroke="#c62828" stroke-width="2.5"/>
  <text x="250" y="88" fill="#c62828" font-size="10">Late change</text>
  <text x="80" y="160" font-size="9">Requirements</text>
  <text x="160" y="160" font-size="9">Design</text>
  <text x="240" y="160" font-size="9">Ops</text>
  <text x="220" y="200" text-anchor="middle" font-size="8" fill="#666">Conceptual — cf. Pressman &amp; Maxim (2015); Boehm (1981). CC BY-SA 4.0.</text>
</svg>
