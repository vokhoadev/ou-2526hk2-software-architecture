<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="Georgia, serif" font-size="12">
  <title>Data-centered architecture</title>
  <rect width="400" height="280" fill="#faf9f7"/>
  <text x="200" y="22" text-anchor="middle" font-weight="bold">Data-centered (repository)</text>
  <circle cx="200" cy="140" r="48" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="200" y="136" text-anchor="middle" font-weight="bold">Data</text>
  <text x="200" y="152" text-anchor="middle" font-weight="bold">store</text>
  <rect x="32" y="56" width="88" height="40" rx="4" fill="#fff" stroke="#333"/>
  <text x="76" y="80" text-anchor="middle">Client A</text>
  <rect x="280" y="56" width="88" height="40" rx="4" fill="#fff" stroke="#333"/>
  <text x="324" y="80" text-anchor="middle">Client B</text>
  <rect x="32" y="184" width="88" height="40" rx="4" fill="#fff" stroke="#333"/>
  <text x="76" y="208" text-anchor="middle">Client C</text>
  <rect x="280" y="184" width="88" height="40" rx="4" fill="#fff" stroke="#333"/>
  <text x="324" y="208" text-anchor="middle">Client D</text>
  <line x1="120" y1="76" x2="162" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="280" y1="76" x2="238" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="120" y1="204" x2="162" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="280" y1="204" x2="238" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#666"/></marker></defs>
  <text x="200" y="268" text-anchor="middle" font-size="9" fill="#666">Aligned with Pressman &amp; Maxim (2015), Fig. 13.1. CC BY-SA 4.0.</text>
</svg>
