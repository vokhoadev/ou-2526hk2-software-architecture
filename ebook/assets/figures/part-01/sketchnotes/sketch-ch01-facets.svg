  <text x="415" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#14532d">NFR</text>
  <text x="415" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#14532d">-ilities</text>
  <path d="M170 114h20M300 114h45" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
