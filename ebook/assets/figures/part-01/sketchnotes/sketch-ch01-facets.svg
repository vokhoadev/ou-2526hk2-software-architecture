  <rect width="520" height="280" fill="#fffdf5"/>
  <path d="M14 20 Q18 16 24 20 L506 14 Q512 18 510 24 L516 256 Q512 262 506 260 L20 266 Q14 262 16 256 Z" fill="#fefce8" stroke="#854d0e" stroke-width="2.6" stroke-linejoin="round"/>
