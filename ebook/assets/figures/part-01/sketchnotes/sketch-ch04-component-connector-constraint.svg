<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" role="img">
  <title>Component, connector, constraint</title>
  <desc>Hai hộp nối bởi dây và khung luật</desc>
  <rect width="520" height="240" fill="#fffdf5"/>
  <path d="M12 16 L508 12 L514 224 L16 228 Z" fill="#eff6ff" stroke="#1e40af" stroke-width="2.4" stroke-linejoin="round"/>
  <text x="260" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1e3a8a">Phong cách = thành phần + đầu nối + ràng buộc</text>
  <rect x="72" y="88" width="96" height="56" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1e40af">Comp A</text>
  <rect x="220" y="88" width="96" height="56" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="268" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1e40af">Comp B</text>
  <path d="M168 116h48" fill="none" stroke="#334155" stroke-width="2.5"/>
  <text x="192" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#475569">connector</text>
  <polygon points="212,110 222,116 212,122" fill="#334155"/>
  <rect x="360" y="72" width="120" height="88" rx="6" fill="none" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="420" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#9a3412">constraint</text>
  <text x="420" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#9a3412">luật được phép nối</text>
  <text x="260" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#475569">Cùng REST bên ngoài, khác bus nội bộ → đánh đổi khác</text>
  <text x="260" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#64748b">Sketchnote gốc (CC BY-SA 4.0)</text>
