  <text x="420" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#064e3b">Giai đoạn 3</text>
  <text x="420" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#065f46">Mở rộng dần</text>
  <path d="M160 94h36M320 94h36" fill="none" stroke="#334155" stroke-width="2"/>
