<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img">
  <title>Sketchnote: diagram as code</title>
  <desc>Laptop với Mermaid trong repo Git, nhánh commit và ghi chú PR review</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffef9"/>
      <stop offset="45%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0c4a6e" flood-opacity="0.12"/>
    </filter>
    <filter id="sh2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="4" stdDeviation="5" flood-color="#422006" flood-opacity="0.14"/>
    </filter>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0369a1" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="600" height="320" fill="url(#bg)"/>
  <path filter="url(#paper)" d="M18 22 Q22 17 30 22 L572 16 Q580 20 578 28 L586 292 Q582 300 574 298 L26 304 Q18 300 20 292 Z" fill="#ffffff" fill-opacity="0.92" stroke="#0284c7" stroke-width="2.4" stroke-linejoin="round"/>
  <text x="300" y="46" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="600" fill="#0c4a6e" transform="rotate(-0.35 300 46)">Sơ đồ sống trong Git</text>
  <text x="300" y="64" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#64748b">Mermaid · PR · diff như code</text>
  <!-- Laptop -->
  <g filter="url(#sh)">
    <rect x="72" y="86" width="236" height="152" rx="10" fill="url(#bezel)" stroke="#475569" stroke-width="2.2"/>
    <rect x="84" y="96" width="212" height="120" rx="6" fill="url(#screen)" stroke="#334155" stroke-width="1.8"/>
    <text x="190" y="118" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#86efac">flowchart TB</text>
    <text x="190" y="134" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#93c5fd">  svc --&gt; broker</text>
    <text x="190" y="150" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#fca5a5">  broker --&gt; db</text>
    <text x="190" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#fde68a">docs/adr/ADR-014.md</text>
    <line x1="96" y1="188" x2="284" y2="188" stroke="#334155" stroke-width="1" stroke-opacity="0.5"/>
    <text x="190" y="202" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="8" fill="#94a3b8">+12 −3 · architecture.md</text>
  </g>
  <path d="M120 246h200l-14 22H134Z" fill="url(#bezel)" stroke="#475569" stroke-width="2" stroke-linejoin="round" filter="url(#sh)"/>
  <!-- Git graph -->
  <g transform="translate(360,88)">
    <path d="M32 8 L32 52 Q32 68 48 76 L88 92" fill="none" stroke="#475569" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M32 8 L80 8 Q96 8 96 24 L96 56" fill="none" stroke="#475569" stroke-width="2.8" stroke-linecap="round"/>
    <circle cx="32" cy="8" r="11" fill="#22c55e" stroke="#14532d" stroke-width="2.2"/>
    <circle cx="96" cy="56" r="11" fill="#22c55e" stroke="#14532d" stroke-width="2.2"/>
    <circle cx="88" cy="92" r="11" fill="#f97316" stroke="#9a3412" stroke-width="2.2"/>
    <text x="54" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#334155">main · feature</text>
  </g>
  <g filter="url(#sh2)">
    <path d="M332 200 Q338 194 346 200 L458 208 Q466 214 462 222 L452 268 Q448 274 440 272 L328 262 Q320 256 324 248 Z" fill="#fef9c3" stroke="#a16207" stroke-width="2.2" transform="rotate(-2.5 390 234)"/>
    <text x="392" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#713f12" transform="rotate(-2.5 392 228)">Tránh slide lệch</text>
    <text x="392" y="244" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#713f12" transform="rotate(-2.5 392 244)">so với code 1 tuần!</text>
  </g>
  <text x="428" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#334155" font-weight="600">PR + diff sơ đồ</text>
  <text x="300" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#94a3b8">Sketchnote · CC BY-SA 4.0</text>
</svg>
