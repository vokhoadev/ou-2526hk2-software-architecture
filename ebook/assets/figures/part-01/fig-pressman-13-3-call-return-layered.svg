<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" font-family="Georgia, serif" font-size="11">
  <title>Call-and-return and layered architecture</title>
  <rect width="560" height="200" fill="#faf9f7"/>
  <text x="280" y="18" text-anchor="middle" font-weight="bold">Call-and-return (left) | Layered (right)</text>
  <text x="120" y="40" text-anchor="middle" font-size="10" fill="#555">Hierarchical control</text>
  <rect x="60" y="52" width="120" height="28" rx="3" fill="#fff" stroke="#333"/><text x="120" y="70" text-anchor="middle">Main / caller</text>
  <line x1="120" y1="80" x2="120" y2="88" stroke="#333"/>
  <rect x="60" y="88" width="120" height="28" rx="3" fill="#fff" stroke="#333"/><text x="120" y="106" text-anchor="middle">Subroutine</text>
  <line x1="120" y1="116" x2="120" y2="124" stroke="#333"/>
  <rect x="60" y="124" width="120" height="28" rx="3" fill="#fff" stroke="#333"/><text x="120" y="142" text-anchor="middle">Leaf</text>
  <text x="360" y="40" text-anchor="middle" font-size="10" fill="#555">Depends downward</text>
  <rect x="280" y="52" width="160" height="32" rx="3" fill="#e3f2fd" stroke="#1565c0"/><text x="360" y="72" text-anchor="middle">Presentation</text>
  <line x1="360" y1="84" x2="360" y2="92" stroke="#333"/>
  <rect x="280" y="92" width="160" height="32" rx="3" fill="#fff3e0" stroke="#ef6c00"/><text x="360" y="112" text-anchor="middle">Business / domain</text>
  <line x1="360" y1="124" x2="360" y2="132" stroke="#333"/>
  <rect x="280" y="132" width="160" height="32" rx="3" fill="#e8f5e9" stroke="#2e7d32"/><text x="360" y="152" text-anchor="middle">Data access</text>
  <text x="280" y="188" text-anchor="middle" font-size="9" fill="#666">Conceptual — Pressman (2015) Fig. 13.3–13.4. CC BY-SA 4.0.</text>
</svg>
