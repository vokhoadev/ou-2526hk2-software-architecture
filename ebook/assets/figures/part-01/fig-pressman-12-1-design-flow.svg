<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" font-family="Georgia, serif" font-size="12">
  <title>Design within software engineering — flow</title>
  <rect width="320" height="380" fill="#faf9f7"/>
  <text x="160" y="24" text-anchor="middle" font-size="14" font-weight="bold">Design flow (conceptual)</text>
  <rect x="40" y="48" width="240" height="52" rx="6" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="160" y="72" text-anchor="middle" font-weight="bold">Requirements model</text>
  <text x="160" y="88" text-anchor="middle" font-size="10">(use cases, analysis)</text>
  <polygon points="160,108 170,118 150,118" fill="#333"/>
  <line x1="160" y1="108" x2="160" y2="128" stroke="#333"/>
  <rect x="40" y="128" width="240" height="52" rx="6" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="160" y="152" text-anchor="middle" font-weight="bold">Architectural design</text>
  <text x="160" y="168" text-anchor="middle" font-size="10">(style, subsystems, relations)</text>
  <line x1="160" y1="180" x2="160" y2="200" stroke="#333"/>
  <polygon points="160,200 170,190 150,190" fill="#333"/>
  <rect x="40" y="200" width="240" height="52" rx="6" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="160" y="224" text-anchor="middle" font-weight="bold">Detailed design</text>
  <text x="160" y="240" text-anchor="middle" font-size="10">(components, interfaces, data)</text>
  <line x1="160" y1="252" x2="160" y2="272" stroke="#333"/>
  <polygon points="160,272 170,262 150,262" fill="#333"/>
  <rect x="40" y="272" width="240" height="44" rx="6" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="160" y="298" text-anchor="middle" font-weight="bold">Implementation</text>
  <text x="160" y="360" text-anchor="middle" font-size="9" fill="#666">Aligned with Pressman &amp; Maxim (2015), Fig. 12.1. CC BY-SA 4.0.</text>
</svg>
