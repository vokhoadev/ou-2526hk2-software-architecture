<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="Georgia, serif" font-size="10">
  <title>ISO 25010 quality model — simplified</title>
  <rect width="520" height="280" fill="#faf9f7"/>
  <text x="260" y="22" text-anchor="middle" font-weight="bold">ISO/IEC 25010 — product quality (simplified)</text>
  <rect x="180" y="44" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="260" y="68" text-anchor="middle" font-weight="bold">Software product quality</text>
  <g fill="#fff" stroke="#555">
    <rect x="40" y="110" width="100" height="32" rx="4"/><text x="90" y="130" text-anchor="middle">Functional</text>
    <rect x="160" y="110" width="100" height="32" rx="4"/><text x="210" y="130" text-anchor="middle">Performance</text>
    <rect x="280" y="110" width="100" height="32" rx="4"/><text x="330" y="130" text-anchor="middle">Compatibility</text>
    <rect x="400" y="110" width="100" height="32" rx="4"/><text x="450" y="130" text-anchor="middle">Usability</text>
    <rect x="40" y="158" width="100" height="32" rx="4"/><text x="90" y="178" text-anchor="middle">Reliability</text>
    <rect x="160" y="158" width="100" height="32" rx="4"/><text x="210" y="178" text-anchor="middle">Security</text>
    <rect x="280" y="158" width="100" height="32" rx="4"/><text x="330" y="178" text-anchor="middle">Maintainability</text>
    <rect x="400" y="158" width="100" height="32" rx="4"/><text x="450" y="178" text-anchor="middle">Portability</text>
  </g>
  <line x1="260" y1="84" x2="90" y2="110" stroke="#999"/><line x1="260" y1="84" x2="210" y2="110" stroke="#999"/>
  <line x1="260" y1="84" x2="330" y2="110" stroke="#999"/><line x1="260" y1="84" x2="450" y2="110" stroke="#999"/>
  <line x1="260" y1="84" x2="90" y2="158" stroke="#999"/><line x1="260" y1="84" x2="210" y2="158" stroke="#999"/>
  <line x1="260" y1="84" x2="330" y2="158" stroke="#999"/><line x1="260" y1="84" x2="450" y2="158" stroke="#999"/>
  <text x="260" y="255" text-anchor="middle" font-size="9" fill="#666">Not official ISO artwork. Based on ISO/IEC 25010:2011 structure. CC BY-SA 4.0.</text>
</svg>
